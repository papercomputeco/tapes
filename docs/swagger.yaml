basePath: /
definitions:
  api.ModelUsage:
    properties:
      calls:
        type: integer
      cost_usd:
        type: number
      input_tokens:
        type: integer
      model:
        type: string
      output_tokens:
        type: integer
    type: object
  api.RawTurnHeaderItem:
    properties:
      agent_name:
        type: string
      id:
        type: integer
      meta:
        items:
          type: integer
        type: array
      provider:
        type: string
      received_at:
        type: string
      request_bytes:
        type: integer
      request_id:
        type: string
      response_bytes:
        type: integer
      source:
        type: string
    type: object
  api.RawTurnListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.RawTurnHeaderItem'
        type: array
    type: object
  api.SessionDetailResponse:
    properties:
      session:
        $ref: '#/definitions/api.SessionItem'
    type: object
  api.SessionItem:
    properties:
      auth_subject:
        description: |-
          AuthSubject is the gateway-stamped JWT subject (WorkOS user id)
          captured at ingest; empty for rows captured before the edge began
          stamping it.
        type: string
      cwd:
        type: string
      derived_status:
        type: string
      ended_at:
        type: string
      harness_id:
        type: string
      harness_metadata:
        additionalProperties: {}
        type: object
      harness_session_id:
        type: string
      harness_version:
        type: string
      id:
        type: string
      last_seen_at:
        type: string
      model:
        description: |-
          Model is the dominant conversation-spine model, folded at derive
          time; empty until the session first derives.
        type: string
      model_usage:
        description: |-
          ModelUsage is the per-model spend breakdown folded at derive time
          across every thread (subagent models included), ordered
          dominant-model-first by cost. The share basis is cost, not call
          count, so the UI can show "dominant model + per-model %" without a
          cheap-subagent fan-out skewing it. Populated on the session detail;
          nil until the session first derives.
        items:
          $ref: '#/definitions/api.ModelUsage'
        type: array
      name:
        type: string
      parent_session_id:
        type: string
      preview:
        type: string
      started_at:
        type: string
      total_cost_usd:
        type: number
      total_input_tokens:
        type: integer
      total_output_tokens:
        type: integer
      turn_count:
        type: integer
    type: object
  api.SessionListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.SessionItem'
        type: array
      next_cursor:
        type: string
    type: object
  api.SessionTracesResponse:
    properties:
      kind_counts:
        additionalProperties:
          type: integer
        type: object
      links:
        items:
          $ref: '#/definitions/api.SpanLinkItem'
        type: array
      session:
        $ref: '#/definitions/api.SessionItem'
      tasks:
        items:
          $ref: '#/definitions/api.TreeTask'
        type: array
      traces:
        items:
          $ref: '#/definitions/api.TraceDetail'
        type: array
    type: object
  api.SpanItem:
    properties:
      children_ids:
        items:
          type: string
        type: array
      duration_ns:
        type: integer
      id:
        type: string
      input:
        additionalProperties: {}
        type: object
      kind:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      metrics:
        description: |-
          Metrics is always an object on the wire — the contract fixture
          pins {} for usage-less spans (agent/tool/event), and the console
          schema requires it.
        items:
          type: integer
        type: array
      name:
        type: string
      output:
        additionalProperties: {}
        type: object
      parent_span_id:
        type: string
      seq:
        description: |-
          Seq is the span's presentation ordinal within its trace; spans
          arrive sorted by it. start_ns cannot order spans inside one llm
          call (parallel tool batches share an instant).
        type: integer
      span_id:
        type: string
      start_ns:
        type: integer
      started_at:
        type: string
      status:
        type: string
      trace_id:
        type: string
    type: object
  api.SpanLinkItem:
    properties:
      from_io:
        type: string
      from_span_id:
        type: string
      from_trace_id:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      to_io:
        type: string
      to_span_id:
        type: string
      to_trace_id:
        type: string
    type: object
  api.SpanSearchOutput:
    properties:
      count:
        type: integer
      query:
        type: string
      results:
        items:
          $ref: '#/definitions/api.SpanSearchResult'
        type: array
    type: object
  api.SpanSearchResult:
    properties:
      model:
        type: string
      score:
        type: number
      session_id:
        type: string
      snippet:
        description: Snippet previews the matched span's delta-only text.
        type: string
      span_id:
        type: string
      started_at:
        type: string
      trace_id:
        type: string
      user_prompt:
        description: UserPrompt is the prompt of the turn (trace) the span belongs
          to.
        type: string
    type: object
  api.StatsResponse:
    properties:
      completed_count:
        type: integer
      input_tokens:
        type: integer
      output_tokens:
        type: integer
      root_count:
        type: integer
      session_count:
        type: integer
      tool_calls:
        type: integer
      total_cost:
        type: number
      total_duration_ns:
        type: integer
      turn_count:
        type: integer
    type: object
  api.TraceDetail:
    properties:
      links:
        items:
          $ref: '#/definitions/api.SpanLinkItem'
        type: array
      spans:
        items:
          $ref: '#/definitions/api.SpanItem'
        type: array
      trace:
        $ref: '#/definitions/api.TraceItem'
    type: object
  api.TraceItem:
    properties:
      cache_creation_tokens:
        type: integer
      cache_read_tokens:
        type: integer
      duration_ns:
        type: integer
      ended_at:
        type: string
      harness_id:
        type: string
      harness_session_id:
        type: string
      id:
        type: string
      main_input_tokens:
        description: |-
          Main* counts conversation-spine calls only; Total − Main is the
          harness's shadow spend on the turn.
        type: integer
      main_output_tokens:
        type: integer
      metadata:
        additionalProperties: {}
        type: object
      response_preview:
        description: |-
          ResponsePreview is the derive-time fold of the closing
          conversation-spine llm call's text output — the answer line for
          collapsed turn cards, so summary consumers never need spans.
        type: string
      session_id:
        type: string
      span_count:
        type: integer
      started_at:
        type: string
      status:
        type: string
      total_cost_usd:
        type: number
      total_input_tokens:
        type: integer
      total_output_tokens:
        type: integer
      trace_id:
        type: string
      user_prompt:
        type: string
    type: object
  api.TraceListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.TraceItem'
        type: array
    type: object
  api.TreeTask:
    properties:
      description:
        type: string
      id:
        type: string
      status:
        type: string
      subject:
        type: string
      updates:
        type: integer
    type: object
  api.seedDemoRequest:
    properties:
      overwrite:
        type: boolean
    type: object
  api.swaggerMCPError:
    properties:
      code:
        example: -32600
        type: integer
      message:
        example: invalid request
        type: string
    type: object
  api.swaggerMCPRequest:
    properties:
      id:
        example: "1"
        type: string
      jsonrpc:
        example: "2.0"
        type: string
      method:
        example: tools/call
        type: string
      params:
        additionalProperties: {}
        type: object
    type: object
  api.swaggerMCPResponse:
    properties:
      error:
        $ref: '#/definitions/api.swaggerMCPError'
      id:
        example: "1"
        type: string
      jsonrpc:
        example: "2.0"
        type: string
      result:
        additionalProperties: {}
        type: object
    type: object
  github_com_papercomputeco_tapes_pkg_llm.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_papercomputeco_tapes_pkg_seed.Result:
    properties:
      nodes_derived:
        description: |-
          NodesDerived counts derived rows upserted by the synchronous
          derive pass across the seeded sessions.
        type: integer
      raw_turns:
        description: RawTurns is the total number of corpus rows replayed.
        type: integer
      raw_turns_deduped:
        type: integer
      raw_turns_inserted:
        description: |-
          RawTurnsInserted counts rows that landed as new raw turns;
          RawTurnsDeduped counts replays the raw layer's dedup absorbed
          (a re-seed reports everything deduped).
        type: integer
      sessions:
        description: Sessions is the number of demo sessions the corpora replay into.
        type: integer
    type: object
info:
  contact: {}
  description: |-
    HTTP API for inspecting, querying, and searching stored Tapes sessions.

    The REST surface exposes health checks, session listing and retrieval, derived session summaries, aggregate stats, semantic search, and a streamable MCP endpoint.
  title: Tapes API
paths:
  /ping:
    get:
      description: Returns a simple JSON string confirming that the API server is
        reachable.
      produces:
      - application/json
      responses:
        "200":
          description: pong
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /v1/admin/seed/demo:
    post:
      consumes:
      - application/json
      description: 'Replays the bundled demo capture corpora through the ingest write
        path into the caller''s org, then derives the seeded sessions. Idempotent:
        raw-turn dedup makes repeat seeds no-ops.'
      parameters:
      - description: Seed options (overwrite is no longer supported)
        in: body
        name: request
        schema:
          $ref: '#/definitions/api.seedDemoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_seed.Result'
        "400":
          description: Invalid payload or unsupported option
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Seeding failed
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Driver does not host the raw-turn layer
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Seed demo sessions (operator)
      tags:
      - admin
  /v1/mcp:
    delete:
      description: Requests termination of a streamable MCP session when a client
        is using session-oriented transport semantics.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
      summary: Close an MCP session
      tags:
      - mcp
    get:
      description: Opens the streamable MCP endpoint for server-sent events. Stateless
        clients can use this to receive streamed MCP messages.
      produces:
      - text/event-stream
      responses:
        "200":
          description: Server-sent event stream
          schema:
            type: string
      summary: Open an MCP event stream
      tags:
      - mcp
    post:
      consumes:
      - application/json
      description: |-
        Sends a JSON-RPC 2.0 request to the stateless Model Context Protocol endpoint mounted at /v1/mcp.

        Typical calls include initialize, tools/list, and tools/call. When search is configured, the server exposes a search tool over this transport.
      parameters:
      - description: JSON-RPC 2.0 request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.swaggerMCPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "400":
          description: Invalid JSON-RPC request
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "500":
          description: Server-side MCP error
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
      summary: Invoke the streamable MCP endpoint
      tags:
      - mcp
  /v1/search/spans:
    get:
      description: Embeds the query text and runs vector similarity over the embedded
        span projection (main llm spans, delta-only content). Each hit carries span,
        trace, and turn context.
      parameters:
      - description: Search query
        in: query
        name: query
        required: true
        type: string
      - default: 5
        description: Maximum number of results to return
        in: query
        minimum: 1
        name: top_k
        type: integer
      - description: Tenant org UUID (defaults to the nil org)
        in: header
        name: X-Tapes-Org-Id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SpanSearchOutput'
        "400":
          description: Missing or invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Search execution failed
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "503":
          description: Span search is not configured or not yet initialized
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Semantic search over span embeddings
      tags:
      - search
  /v1/sessions:
    get:
      description: Returns one row per harness session from the sessions table, cursor-paginated.
        Default order is last_active (last_seen_at) desc; override with the sort and
        direction query params.
      parameters:
      - description: Maximum number of sessions to return (default 50, max 200)
        in: query
        minimum: 1
        name: limit
        type: integer
      - description: Opaque pagination cursor returned by a previous response
        in: query
        name: cursor
        type: string
      - description: 'Sort column: last_active|started_at|turn_count|total_cost_usd|total_tokens|duration_ns|derived_status|auth_subject
          (default last_active)'
        in: query
        name: sort
        type: string
      - description: 'Sort direction: asc|desc (default desc)'
        in: query
        name: direction
        type: string
      - description: Only include sessions active (last_seen_at) at or after this
          RFC3339 timestamp
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include sessions active (last_seen_at) before this RFC3339
          timestamp
        format: date-time
        in: query
        name: until
        type: string
      - description: Filter to the single session with this harness id (exact match;
          requires harness_session_id, incompatible with cursor; limit is ignored
          when the filter is active)
        in: query
        name: harness_id
        type: string
      - description: Filter to the single session with this harness session id (exact
          match; requires harness_id, incompatible with cursor; limit is ignored when
          the filter is active)
        in: query
        name: harness_session_id
        type: string
      - description: Filter the paged list to sessions captured for this gateway-stamped
          JWT subject (exact match; ignored on the harness filter path)
        in: query
        name: auth_subject
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionListResponse'
        "400":
          description: Invalid query parameters, a lone harness filter param, or cursor
            combined with the harness filter
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to list sessions
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List sessions
      tags:
      - sessions
  /v1/sessions/{id}:
    delete:
      description: 'Permanently deletes a session and its subtree: subagent child
        sessions and their derived traces/spans cascade with it. Org-scoped — any
        caller in the org may delete any of its sessions. The immutable raw_turns
        capture log is left intact.'
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Session deleted
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to delete session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Delete a session
      tags:
      - sessions
    get:
      description: 'Returns a single session record. The conversation content lives
        on the span model: GET /v1/sessions/{id}/traces.'
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionDetailResponse'
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a session
      tags:
      - sessions
  /v1/sessions/{id}/export:
    get:
      description: 'Returns the session as a single JSON line (downloadable attachment):
        the session object with its traces, each trace carrying its full spans — the
        same shape as GET /v1/sessions/{id}/traces with payload=full.'
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: JSONL body, one session object with nested traces and spans
          schema:
            type: string
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load or render the session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Export a session as JSONL
      tags:
      - sessions
  /v1/sessions/{id}/raw_turns:
    get:
      description: 'The raw layer''s wire log: one row per captured call or transcript
        push, identity and sizes only. `source` distinguishes what crossed the wire
        from what the harness pushed as its own account.'
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.RawTurnListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List a session's raw capture log (operator)
      tags:
      - sessions
  /v1/sessions/{id}/traces:
    get:
      description: Returns the session's user-visible turns as traces with nested
        spans (llm calls, tools, subagents, shadow calls, injected context) and dataflow
        links. Cross-trace links (compaction seams) are at the response top level.
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Span payload mode: full (default) or preview (strings truncated;
          fetch the span endpoint for full payloads)'
        in: query
        name: payload
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionTracesResponse'
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Span traces not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a session's trace/span projection
      tags:
      - sessions
  /v1/sessions/export:
    get:
      description: Streams one JSON line per session in the given window, newest-first,
        as a downloadable attachment. Each line is the session object with its traces,
        each trace carrying its full spans — the same shape as GET /v1/sessions/{id}/traces
        with payload=full. Defaults to the trailing 30 days. Not bounded by the /v1/sessions
        list cap — pages internally.
      parameters:
      - description: 'Only include sessions active (last_seen_at) at or after this
          RFC3339 timestamp (default: now - 30 days)'
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include sessions active (last_seen_at) before this RFC3339
          timestamp
        format: date-time
        in: query
        name: until
        type: string
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: JSONL body, one JSON object per session with nested traces
            and spans
          schema:
            type: string
        "400":
          description: Malformed since/until
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to list or render sessions
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Export sessions in a time window as JSONL
      tags:
      - sessions
  /v1/stats:
    get:
      description: Returns counts plus cost / token / duration / tool-call / completed-count
        totals for the window. The numbers are span-grain trace rollup sums (delta-only
        usage, agent time = sum of trace durations) so they agree with the session
        and trace views; turn_count counts traces. Filter the window with since/until.
      parameters:
      - description: Only include records at or after this RFC3339 timestamp
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include records before or at this RFC3339 timestamp
        format: date-time
        in: query
        name: until
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.StatsResponse'
