basePath: /
definitions:
  api.BrowserTokenResponse:
    properties:
      expires_at:
        type: string
      org_id:
        type: string
      token:
        type: string
    type: object
  api.MainUsage:
    properties:
      input_tokens:
        type: integer
      output_tokens:
        type: integer
    type: object
  api.ModelUsage:
    properties:
      calls:
        type: integer
      cost_usd:
        type: number
      input_tokens:
        type: integer
      model:
        type: string
      output_tokens:
        type: integer
    type: object
  api.RawTurnHeaderItem:
    properties:
      agent_name:
        type: string
      id:
        type: integer
      meta:
        type: object
      provider:
        type: string
      received_at:
        type: string
      request_bytes:
        type: integer
      request_id:
        type: string
      response_bytes:
        type: integer
      source:
        type: string
    type: object
  api.RawTurnListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.RawTurnHeaderItem'
        type: array
    type: object
  api.SessionDetailResponse:
    properties:
      session:
        $ref: '#/definitions/api.SessionItem'
    type: object
  api.SessionItem:
    properties:
      auth_subject:
        description: |-
          AuthSubject is the gateway-stamped JWT subject (WorkOS user id)
          captured at ingest; empty for rows captured before the edge began
          stamping it.
        type: string
      cwd:
        type: string
      ended_at:
        type: string
      harness_id:
        type: string
      harness_metadata:
        additionalProperties: {}
        type: object
      harness_session_id:
        type: string
      harness_version:
        type: string
      id:
        description: Identity — capture-side facts, ingest-written.
        type: string
      last_seen_at:
        type: string
      live:
        description: |-
          Live is a runtime presence signal, not a projection fact: true when
          the session was seen within the liveness window AND the deriver has
          not marked it terminal. Computed at response time from last_seen_at,
          so the console renders it directly instead of inferring "running"
          from recency itself (keeps the console dumb; RFD 00007 §C).
        type: boolean
      name:
        description: |-
          Name is the session's display label: the value on the identity row —
          a user rename or the harness-supplied session name — when set,
          otherwise the folded title (rollup.title) as a fallback. Empty only
          when the session has neither. It therefore equals rollup.title
          exactly when no identity-row name exists.
        type: string
      parent_session_id:
        type: string
      rollup:
        allOf:
        - $ref: '#/definitions/api.SessionRollup'
        description: Rollup is the deriver-owned projection over the session's spans.
      started_at:
        type: string
    type: object
  api.SessionListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.SessionItem'
        type: array
      next_cursor:
        type: string
    type: object
  api.SessionRollup:
    properties:
      kind_counts:
        additionalProperties:
          type: integer
        description: |-
          KindCounts (spans per call_kind) and Tasks (TaskCreate/TaskUpdate
          folds) are pinned so the rollup shape is uniform across sessions.
        type: object
      model:
        description: |-
          Model is the dominant conversation-spine model; ModelUsage is the
          per-model spend breakdown across every thread (subagent models
          included), cost-ordered so the UI can show "dominant model + share"
          without a cheap-subagent fan-out skewing it.
        type: string
      model_usage:
        items:
          $ref: '#/definitions/api.ModelUsage'
        type: array
      preview:
        type: string
      status:
        type: string
      tasks:
        items:
          $ref: '#/definitions/api.TreeTask'
        type: array
      title:
        description: |-
          Title is the deriver's folded session title (derived_title),
          generated from the conversation. Empty until title generation
          produces one. It never falls back to the identity-row name, so it is
          the stable descriptive title clients prefer for display; the
          identity-row label (harness name or rename) is SessionItem.Name.
        type: string
      turn_count:
        type: integer
      usage:
        $ref: '#/definitions/api.SessionUsage'
    type: object
  api.SessionTracesResponse:
    properties:
      links:
        items:
          $ref: '#/definitions/api.SpanLinkItem'
        type: array
      schema:
        type: string
      session:
        $ref: '#/definitions/api.SessionItem'
      traces:
        items:
          $ref: '#/definitions/api.TraceDetail'
        type: array
    type: object
  api.SessionUsage:
    properties:
      cost_usd:
        type: number
      input_tokens:
        type: integer
      output_tokens:
        type: integer
    type: object
  api.SpanItem:
    properties:
      call_kind:
        description: Deriver-written taxonomy, promoted from the old metadata grab-bag.
        type: string
      duration_ns:
        type: integer
      input:
        description: |-
          Input/Output are content-block arrays (llm.ContentBlock), uniform for
          every kind (tool spans included — no unwrapping). Pinned to [] when
          empty. swaggertype keeps the wire an array-of-object rather than the
          json.RawMessage byte array swag infers.
        items:
          type: object
        type: array
      kind:
        type: string
      model:
        type: string
      name:
        type: string
      output:
        items:
          type: object
        type: array
      parent_span_id:
        type: string
      payload:
        description: |-
          Payload marks a preview-truncated span so the console drills in for
          the full payload; absent in full mode.
        type: string
      raw_turn_id:
        type: integer
      seq:
        description: |-
          Seq is the span's presentation ordinal within its trace; spans
          arrive sorted by it (started_at ties inside one llm call — parallel
          tool batches share an instant).
        type: integer
      span_id:
        type: string
      started_at:
        type: string
      status:
        type: string
      stop_reason:
        type: string
      thread_id:
        type: string
      trace_id:
        type: string
      usage:
        description: |-
          Usage (was `metrics`) is an llm.Usage object on the wire — {}-pinned
          for usage-less spans.
        type: object
      verdict:
        description: |-
          Verdict is the typed security-monitor disposition (null off
          permission-check spans), deriver-written. It is a Verdict object or
          null on the wire; typed as `object` (not the json.RawMessage byte
          array swag would otherwise emit) via swaggertype.
        type: object
        x-nullable: true
    type: object
  api.SpanLinkItem:
    properties:
      from_io:
        type: string
      from_span_id:
        type: string
      from_trace_id:
        type: string
      kind:
        type: string
      to_io:
        type: string
      to_span_id:
        type: string
      to_trace_id:
        type: string
    type: object
  api.SpanSearchOutput:
    properties:
      count:
        type: integer
      query:
        type: string
      results:
        items:
          $ref: '#/definitions/api.SpanSearchResult'
        type: array
    type: object
  api.SpanSearchResult:
    properties:
      model:
        type: string
      score:
        type: number
      session_id:
        type: string
      snippet:
        description: Snippet previews the matched span's delta-only text.
        type: string
      span_id:
        type: string
      started_at:
        type: string
      trace_id:
        type: string
      user_prompt:
        description: |-
          UserPrompt is the prompt of the turn (trace) the span belongs to.
          Served explicitly (not omitempty) so a synthetic turn's empty prompt
          reaches consumers as "" rather than a dropped key — see TraceItem.
        type: string
    type: object
  api.StatsResponse:
    properties:
      completed_count:
        type: integer
      input_tokens:
        type: integer
      output_tokens:
        type: integer
      session_count:
        type: integer
      tool_calls:
        type: integer
      total_cost:
        type: number
      total_duration_ms:
        type: integer
      turn_count:
        type: integer
    type: object
  api.TraceDetail:
    properties:
      links:
        items:
          $ref: '#/definitions/api.SpanLinkItem'
        type: array
      schema:
        type: string
      spans:
        items:
          $ref: '#/definitions/api.SpanItem'
        type: array
      trace:
        $ref: '#/definitions/api.TraceItem'
    type: object
  api.TraceItem:
    properties:
      duration_ns:
        type: integer
      ended_at:
        type: string
      main_usage:
        $ref: '#/definitions/api.MainUsage'
      response_preview:
        description: |-
          ResponsePreview is the derive-time fold of the closing
          conversation-spine llm call's text output — the answer line for
          collapsed turn cards, so summary consumers never need spans.
        type: string
      source:
        description: |-
          Source is the capture origin of the turn's rows ("wire" |
          "transcript"), promoted from raw_turns.source. Per-trace, so a
          session can mix live wire capture and transcript backfill. Today
          every trace is "wire": transcripts only reconcile fork/parent edges
          during derivation, they never form a trace on their own. "transcript"
          becomes real when a session is reconstructed purely from a transcript
          file with no proxy capture (an OSS backfill path). See RFD 00007 §C.
        type: string
      span_count:
        type: integer
      started_at:
        type: string
      status:
        type: string
      synthetic:
        description: |-
          Synthetic is a typed deriver signal ("post-compaction" for a
          compaction continuation, "shadow-opener" for a shadow-only opener),
          promoted out of the old metadata grab-bag. Absent for genuine
          prompt-opened turns.
        type: string
      trace_id:
        type: string
      usage:
        allOf:
        - $ref: '#/definitions/api.TraceUsage'
        description: |-
          Usage is the trace's total token/cost spend over ALL llm spans,
          shadow calls included; MainUsage is the task slice — the main agent
          and its subagents (every call_kind=main span, across threads). The
          difference (Usage − MainUsage) is the harness's shadow spend
          (permission checks, title-gen, web summaries) on the turn.
      user_prompt:
        description: |-
          UserPrompt is served explicitly (not omitempty): a synthetic opener
          has an empty prompt, and dropping the key turns the empty string
          into `undefined` on the wire, which breaks consumers that expect a
          string (e.g. the console's stripHarnessTags). Empty means synthetic.
        type: string
    type: object
  api.TraceListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.TraceItem'
        type: array
      schema:
        type: string
    type: object
  api.TraceUsage:
    properties:
      cache_creation_tokens:
        type: integer
      cache_read_tokens:
        type: integer
      cost_usd:
        type: number
      input_tokens:
        type: integer
      output_tokens:
        type: integer
    type: object
  api.TreeTask:
    properties:
      description:
        type: string
      id:
        type: string
      status:
        type: string
      subject:
        type: string
      updates:
        type: integer
    type: object
  api.seedDemoRequest:
    properties:
      overwrite:
        type: boolean
    type: object
  api.sessionUpdateRequest:
    properties:
      name:
        type: string
    type: object
  api.swaggerMCPError:
    properties:
      code:
        example: -32600
        type: integer
      message:
        example: invalid request
        type: string
    type: object
  api.swaggerMCPRequest:
    properties:
      id:
        example: "1"
        type: string
      jsonrpc:
        example: "2.0"
        type: string
      method:
        example: tools/call
        type: string
      params:
        additionalProperties: {}
        type: object
    type: object
  api.swaggerMCPResponse:
    properties:
      error:
        $ref: '#/definitions/api.swaggerMCPError'
      id:
        example: "1"
        type: string
      jsonrpc:
        example: "2.0"
        type: string
      result:
        additionalProperties: {}
        type: object
    type: object
  github_com_papercomputeco_tapes_pkg_llm.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_papercomputeco_tapes_pkg_seed.Result:
    properties:
      raw_turns:
        description: RawTurns is the total number of corpus rows replayed.
        type: integer
      raw_turns_deduped:
        type: integer
      raw_turns_inserted:
        description: |-
          RawTurnsInserted counts rows that landed as new raw turns;
          RawTurnsDeduped counts replays the raw layer's dedup absorbed
          (a re-seed reports everything deduped).
        type: integer
      sessions:
        description: Sessions is the number of demo sessions the corpora replay into.
        type: integer
    type: object
info:
  contact: {}
  description: |-
    HTTP API for inspecting, querying, and searching stored Tapes sessions.

    The REST surface exposes health checks, session listing and retrieval, derived session summaries, aggregate stats, semantic search, and a streamable MCP endpoint.
  title: Tapes API
  version: "1.0"
paths:
  /ping:
    get:
      description: Returns a simple JSON string confirming that the API server is
        reachable.
      operationId: ping
      produces:
      - application/json
      responses:
        "200":
          description: pong
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /v1/admin/seed/demo:
    post:
      consumes:
      - application/json
      description: 'Replays the bundled demo capture corpora through the ingest write
        path into the caller''s org, then derives the seeded sessions. Idempotent:
        raw-turn dedup makes repeat seeds no-ops.'
      operationId: seedDemo
      parameters:
      - description: Seed options (overwrite is no longer supported)
        in: body
        name: request
        schema:
          $ref: '#/definitions/api.seedDemoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_seed.Result'
        "400":
          description: Invalid payload or unsupported option
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Seeding failed
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Driver does not host the raw-turn layer
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Seed demo sessions (operator)
      tags:
      - admin
  /v1/browser-tokens:
    post:
      description: Mints a short-lived token bound to the request's tenant and subject,
        suitable for a browser to present on X-Paper-Auth when calling the read endpoints
        directly (PCC-945). Minting is meant for trusted server-side callers on the
        same edge-stamped path as every other request; the token only re-asserts an
        identity that path already carries.
      operationId: mintBrowserToken
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.BrowserTokenResponse'
        "501":
          description: Browser tokens not configured
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Mint a short-lived browser read token
      tags:
      - auth
  /v1/mcp:
    delete:
      description: Requests termination of a streamable MCP session when a client
        is using session-oriented transport semantics.
      operationId: closeMcpSession
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
      summary: Close an MCP session
      tags:
      - mcp
    get:
      description: Opens the streamable MCP endpoint for server-sent events. Stateless
        clients can use this to receive streamed MCP messages.
      operationId: openMcpStream
      produces:
      - text/event-stream
      responses:
        "200":
          description: Server-sent event stream
          schema:
            type: string
      summary: Open an MCP event stream
      tags:
      - mcp
    post:
      consumes:
      - application/json
      description: |-
        Sends a JSON-RPC 2.0 request to the stateless Model Context Protocol endpoint mounted at /v1/mcp.

        Typical calls include initialize, tools/list, and tools/call. When search is configured, the server exposes a search tool over this transport.
      operationId: invokeMcp
      parameters:
      - description: JSON-RPC 2.0 request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.swaggerMCPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "400":
          description: Invalid JSON-RPC request
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "500":
          description: Server-side MCP error
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
      summary: Invoke the streamable MCP endpoint
      tags:
      - mcp
  /v1/search/spans:
    get:
      description: Embeds the query text and runs vector similarity over the embedded
        span projection (main llm spans, delta-only content). Each hit carries span,
        trace, and turn context.
      operationId: searchSpans
      parameters:
      - description: Search query
        in: query
        name: query
        required: true
        type: string
      - default: 5
        description: Maximum number of results to return
        in: query
        minimum: 1
        name: top_k
        type: integer
      - description: Tenant org UUID (defaults to the nil org)
        in: header
        name: X-Tapes-Org-Id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SpanSearchOutput'
        "400":
          description: Missing or invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Search execution failed
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "503":
          description: Span search is not configured or not yet initialized
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Semantic search over span embeddings
      tags:
      - search
  /v1/sessions:
    get:
      description: Returns one row per harness session from the sessions table, cursor-paginated.
        Default order is last_active (last_seen_at) desc; override with the sort and
        direction query params.
      operationId: listSessions
      parameters:
      - description: Maximum number of sessions to return (default 50, max 200)
        in: query
        minimum: 1
        name: limit
        type: integer
      - description: Opaque pagination cursor returned by a previous response
        in: query
        name: cursor
        type: string
      - description: 'Sort column: last_active|started_at|turn_count|total_cost_usd|total_tokens|duration_ns|derived_status|auth_subject
          (default last_active)'
        in: query
        name: sort
        type: string
      - description: 'Sort direction: asc|desc (default desc)'
        in: query
        name: direction
        type: string
      - description: Only include sessions with a turn started at or after this RFC3339
          timestamp (activity window, matches /v1/stats)
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include sessions with a turn started before this RFC3339
          timestamp (activity window, matches /v1/stats)
        format: date-time
        in: query
        name: until
        type: string
      - description: Filter to the single session with this harness id (exact match;
          requires harness_session_id, incompatible with cursor; limit is ignored
          when the filter is active)
        in: query
        name: harness_id
        type: string
      - description: Filter to the single session with this harness session id (exact
          match; requires harness_id, incompatible with cursor; limit is ignored when
          the filter is active)
        in: query
        name: harness_session_id
        type: string
      - description: Filter the paged list to sessions captured for this gateway-stamped
          JWT subject (exact match; ignored on the harness filter path)
        in: query
        name: auth_subject
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionListResponse'
        "400":
          description: Invalid query parameters, a lone harness filter param, or cursor
            combined with the harness filter
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to list sessions
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List sessions
      tags:
      - sessions
  /v1/sessions/{id}:
    delete:
      description: 'Permanently deletes a session and its subtree: subagent child
        sessions and their derived traces/spans cascade with it. Org-scoped — any
        caller in the org may delete any of its sessions. The immutable raw_turns
        capture log is left intact.'
      operationId: deleteSession
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Session deleted
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to delete session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Delete a session
      tags:
      - sessions
    get:
      description: 'Returns a single session record. The conversation content lives
        on the span model: GET /v1/sessions/{id}/traces.'
      operationId: getSession
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionDetailResponse'
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a session
      tags:
      - sessions
    patch:
      consumes:
      - application/json
      description: Updates the user-editable session name. An absent field is a 400;
        null or empty (after trim) clears back to the auto-derived title. Length is
        bounded to 200 characters.
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.sessionUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionDetailResponse'
        "400":
          description: Missing/malformed id, missing name field, or name exceeds 200
            characters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found or not in caller's org
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to update session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Update a session's title
      tags:
      - sessions
  /v1/sessions/{id}/export:
    get:
      description: 'Returns the session as a single JSON line (downloadable attachment):
        the session object with its traces, each trace carrying its full spans — the
        same shape as GET /v1/sessions/{id}/traces with payload=full. detail=traces
        exports turn headers only (no spans or links).'
      operationId: exportSession
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Export granularity: spans (default, traces with full spans)
          or traces (turn headers only)'
        enum:
        - spans
        - traces
        in: query
        name: detail
        type: string
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: JSONL body, one session object with nested traces (and spans
            at detail=spans)
          schema:
            type: string
        "400":
          description: Missing or malformed id, or unrecognized detail
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load or render the session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Export a session as JSONL
      tags:
      - sessions
  /v1/sessions/{id}/raw_turns:
    get:
      description: 'The raw layer''s wire log: one row per captured call or transcript
        push, identity and sizes only. `source` distinguishes what crossed the wire
        from what the harness pushed as its own account.'
      operationId: listRawTurns
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.RawTurnListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List a session's raw capture log (operator)
      tags:
      - sessions
  /v1/sessions/{id}/traces:
    get:
      description: Returns the session's user-visible turns as traces with nested
        spans (llm calls, tools, subagents, shadow calls, injected context) and dataflow
        links. Cross-trace links (compaction seams) are at the response top level.
      operationId: getSessionTraces
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Span payload mode: full (default) or preview (strings truncated;
          fetch the span endpoint for full payloads)'
        in: query
        name: payload
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionTracesResponse'
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Span traces not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a session's trace/span projection
      tags:
      - sessions
  /v1/sessions/export:
    get:
      description: Streams one JSON line per session in the given window, newest-first,
        as a downloadable attachment. Each line is the session object with its traces,
        each trace carrying its full spans — the same shape as GET /v1/sessions/{id}/traces
        with payload=full. detail=traces exports turn headers only (no spans or links).
        Defaults to the trailing 30 days. Not bounded by the /v1/sessions list cap
        — pages internally.
      operationId: exportSessions
      parameters:
      - description: 'Only include sessions with a turn started at or after this RFC3339
          timestamp (activity window; default: now - 30 days)'
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include sessions with a turn started before this RFC3339
          timestamp (activity window)
        format: date-time
        in: query
        name: until
        type: string
      - description: 'Export granularity: spans (default, traces with full spans)
          or traces (turn headers only)'
        enum:
        - spans
        - traces
        in: query
        name: detail
        type: string
      produces:
      - application/x-ndjson
      responses:
        "200":
          description: JSONL body, one JSON object per session with nested traces
            (and spans at detail=spans)
          schema:
            type: string
        "400":
          description: Malformed since/until, or unrecognized detail
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to list or render sessions
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Export sessions in a time window as JSONL
      tags:
      - sessions
  /v1/stats:
    get:
      description: Returns counts plus cost / token / duration / tool-call / completed-count
        totals for the window. The numbers are span-grain trace rollup sums (delta-only
        usage, agent time = sum of trace durations) so they agree with the session
        and trace views; turn_count counts traces. Filter the window with since/until.
      operationId: getStats
      parameters:
      - description: Only include records at or after this RFC3339 timestamp
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include records before or at this RFC3339 timestamp
        format: date-time
        in: query
        name: until
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.StatsResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to compute stats
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get aggregate session stats
      tags:
      - sessions
  /v1/traces:
    get:
      description: Returns turn headers for a session — no span payloads. Fetch GET
        /v1/traces/{trace_id} per turn for spans and links.
      operationId: listTraces
      parameters:
      - description: Session id (UUID)
        in: query
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TraceListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List a session's traces (summaries)
      tags:
      - traces
  /v1/traces/{trace_id}:
    get:
      description: 'Returns one user-visible turn: its spans nested by parent_span_id
        and its dataflow links (links touching other traces included).'
      operationId: getTrace
      parameters:
      - description: Trace id
        in: path
        name: trace_id
        required: true
        type: string
      - description: 'Span payload mode: full (default) or preview (strings truncated;
          fetch the span endpoint for full payloads)'
        in: query
        name: payload
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TraceDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get one trace with spans and links
      tags:
      - traces
  /v1/traces/{trace_id}/spans/{span_id}:
    get:
      description: 'The payload drill-in: one span''s complete input/output content.'
      operationId: getSpan
      parameters:
      - description: Trace id
        in: path
        name: trace_id
        required: true
        type: string
      - description: Span id
        in: path
        name: span_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SpanItem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get one span with full payloads
      tags:
      - traces
schemes:
- http
- https
