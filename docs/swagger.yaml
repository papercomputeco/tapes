basePath: /
definitions:
  api.GraphLink:
    properties:
      source:
        type: string
      target:
        type: string
    type: object
  api.GraphNode:
    properties:
      agent_name:
        type: string
      children_count:
        type: integer
      created_at:
        type: string
      depth:
        type: integer
      id:
        type: string
      is_branch_point:
        type: boolean
      is_leaf:
        type: boolean
      is_root:
        type: boolean
      model:
        type: string
      node_kind:
        description: |-
          NodeKind / ParentToolUseID surface the derived semantic typing
          (additive; empty for nodes that predate the deriver).
        type: string
      parent_hash:
        type: string
      parent_id:
        type: string
      parent_tool_use_id:
        type: string
      preview:
        type: string
      project:
        type: string
      provider:
        type: string
      role:
        type: string
      selected:
        type: boolean
      stop_reason:
        type: string
      thread_id:
        type: string
      type:
        type: string
      usage:
        $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.Usage'
    type: object
  api.GraphResponse:
    properties:
      branch_points:
        description: BranchPoints names included nodes with more than one child in
          storage.
        items:
          type: string
        type: array
      cycle_detected:
        description: CycleDetected is true when storage guarded the ancestry walk
          out of a cycle.
        type: boolean
      hash:
        description: Hash is the session/node hash requested by the caller.
        type: string
      leaves:
        description: Leaves names included nodes that have no children in storage.
        items:
          type: string
        type: array
      links:
        description: Links contains parent -> child edges between included nodes.
        items:
          $ref: '#/definitions/api.GraphLink'
        type: array
      missing_parent:
        description: MissingParent names the unresolved parent hash when the ancestry
          is incomplete.
        type: string
      node_limit:
        description: NodeLimit is the maximum number of nodes the server will include.
        type: integer
      nodes:
        description: Nodes is the flat node list consumed by graph visualizers.
        items:
          $ref: '#/definitions/api.GraphNode'
        type: array
      root_hash:
        description: RootHash is the top-most resolvable node included in the response.
        type: string
      scope:
        description: 'Scope describes which portion of the graph was loaded: root,
          branch, or ancestry.'
        type: string
      truncated:
        description: Truncated is true when the graph hit NodeLimit or the ancestry
          chain is incomplete.
        type: boolean
    type: object
  api.RawTurnHeaderItem:
    properties:
      agent_name:
        type: string
      id:
        type: integer
      meta:
        items:
          type: integer
        type: array
      provider:
        type: string
      received_at:
        type: string
      request_bytes:
        type: integer
      request_id:
        type: string
      response_bytes:
        type: integer
      source:
        type: string
    type: object
  api.RawTurnListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.RawTurnHeaderItem'
        type: array
    type: object
  api.SessionDetailResponse:
    properties:
      session:
        $ref: '#/definitions/api.SessionItem'
      stems:
        items:
          $ref: '#/definitions/api.StemSummary'
        type: array
      turns:
        items:
          $ref: '#/definitions/api.Turn'
        type: array
    type: object
  api.SessionItem:
    properties:
      cwd:
        type: string
      derived_status:
        type: string
      ended_at:
        type: string
      harness_id:
        type: string
      harness_metadata:
        additionalProperties: {}
        type: object
      harness_session_id:
        type: string
      harness_version:
        type: string
      id:
        type: string
      last_seen_at:
        type: string
      name:
        type: string
      parent_session_id:
        type: string
      preview:
        type: string
      started_at:
        type: string
      total_cost_usd:
        type: number
      total_input_tokens:
        type: integer
      total_output_tokens:
        type: integer
      turn_count:
        type: integer
    type: object
  api.SessionListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.SessionItem'
        type: array
      next_cursor:
        type: string
    type: object
  api.SessionTracesResponse:
    properties:
      kind_counts:
        additionalProperties:
          type: integer
        type: object
      links:
        items:
          $ref: '#/definitions/api.SpanLinkItem'
        type: array
      session:
        $ref: '#/definitions/api.SessionItem'
      tasks:
        items:
          $ref: '#/definitions/api.TreeTask'
        type: array
      traces:
        items:
          $ref: '#/definitions/api.TraceDetail'
        type: array
    type: object
  api.SessionTreeResponse:
    properties:
      attachments:
        description: |-
          Attachments link offshoot calls to the tool_use they relate to:
          permission checks to the judged action, web summaries to their
          fetch/search.
        items:
          $ref: '#/definitions/api.TreeAttachment'
        type: array
      forks:
        description: |-
          Forks are subagent threads: a chain whose root carries the Task
          tool_use that spawned it. SourceID is the node holding the
          tool_use block; RejoinID the node holding its tool_result.
        items:
          $ref: '#/definitions/api.TreeFork'
        type: array
      harness_session_id:
        type: string
      kind_counts:
        additionalProperties:
          type: integer
        description: KindCounts summarizes the session's call mix.
        type: object
      links:
        items:
          $ref: '#/definitions/api.GraphLink'
        type: array
      nodes:
        items:
          $ref: '#/definitions/api.TreeNode'
        type: array
      roots:
        description: Roots are the parentless chain roots, main thread first.
        items:
          type: string
        type: array
      session_id:
        type: string
      tasks:
        description: |-
          Tasks is the session's task list, folded from the TaskCreate /
          TaskUpdate tool calls across every thread — the checklist of
          record with each task's final status.
        items:
          $ref: '#/definitions/api.TreeTask'
        type: array
    type: object
  api.SpanItem:
    properties:
      children_ids:
        items:
          type: string
        type: array
      duration_ns:
        type: integer
      id:
        type: string
      input:
        additionalProperties: {}
        type: object
      kind:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      metrics:
        description: |-
          Metrics is always an object on the wire — the contract fixture
          pins {} for usage-less spans (agent/tool/event), and the console
          schema requires it.
        items:
          type: integer
        type: array
      name:
        type: string
      output:
        additionalProperties: {}
        type: object
      parent_span_id:
        type: string
      seq:
        description: |-
          Seq is the span's presentation ordinal within its trace; spans
          arrive sorted by it. start_ns cannot order spans inside one llm
          call (parallel tool batches share an instant).
        type: integer
      span_id:
        type: string
      start_ns:
        type: integer
      started_at:
        type: string
      status:
        type: string
      trace_id:
        type: string
    type: object
  api.SpanLinkItem:
    properties:
      from_io:
        type: string
      from_span_id:
        type: string
      from_trace_id:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      to_io:
        type: string
      to_span_id:
        type: string
      to_trace_id:
        type: string
    type: object
  api.SpanSearchOutput:
    properties:
      count:
        type: integer
      query:
        type: string
      results:
        items:
          $ref: '#/definitions/api.SpanSearchResult'
        type: array
    type: object
  api.SpanSearchResult:
    properties:
      model:
        type: string
      score:
        type: number
      session_id:
        type: string
      snippet:
        description: Snippet previews the matched span's delta-only text.
        type: string
      span_id:
        type: string
      started_at:
        type: string
      trace_id:
        type: string
      user_prompt:
        description: UserPrompt is the prompt of the turn (trace) the span belongs
          to.
        type: string
    type: object
  api.StatsResponse:
    properties:
      completed_count:
        type: integer
      input_tokens:
        type: integer
      output_tokens:
        type: integer
      root_count:
        type: integer
      session_count:
        type: integer
      stem_count:
        description: |-
          StemCount is a node-layer (Merkle leaf) concept with no span
          equivalent; it is only present on the legacy fallback path.
        type: integer
      tool_calls:
        type: integer
      total_cost:
        type: number
      total_duration_ns:
        type: integer
      turn_count:
        type: integer
    type: object
  api.StemListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_sessions.SessionSummary'
        type: array
      next_cursor:
        type: string
    type: object
  api.StemResponse:
    properties:
      depth:
        description: |-
          Depth is the total number of turns in the full ancestry of Hash.
          When the client passes ?depth=N, the Turns array may contain fewer
          than Depth items.
        type: integer
      harness_id:
        description: |-
          HarnessID and HarnessSessionID identify the upstream agent session when
          session tracking metadata is available. For Claude Code, HarnessID is
          "claude" and HarnessSessionID is Claude's session id.
        type: string
      harness_session_id:
        type: string
      hash:
        description: Hash is the head of the returned chain (== the requested hash).
        type: string
      missing_parent:
        type: string
      truncated:
        description: |-
          Truncated is true when the ancestry walk stopped at a parent_hash
          that could not be resolved in the current store. MissingParent
          names that hash. This is an expected edge case on stores that
          trim older data, merge foreign content, or offload history to
          another source — not an error.
        type: boolean
      turns:
        description: |-
          Turns contains the chain in chronological order (root-first).
          When ?depth=N is supplied, only the last N turns (head + N-1 ancestors)
          are returned, still in chronological order.
        items:
          $ref: '#/definitions/api.Turn'
        type: array
    type: object
  api.StemSummary:
    properties:
      length:
        type: integer
      model:
        type: string
      preview:
        type: string
      root_hash:
        type: string
    type: object
  api.TraceDetail:
    properties:
      links:
        items:
          $ref: '#/definitions/api.SpanLinkItem'
        type: array
      spans:
        items:
          $ref: '#/definitions/api.SpanItem'
        type: array
      trace:
        $ref: '#/definitions/api.TraceItem'
    type: object
  api.TraceItem:
    properties:
      cache_creation_tokens:
        type: integer
      cache_read_tokens:
        type: integer
      duration_ns:
        type: integer
      ended_at:
        type: string
      harness_id:
        type: string
      harness_session_id:
        type: string
      id:
        type: string
      main_input_tokens:
        description: |-
          Main* counts conversation-spine calls only; Total − Main is the
          harness's shadow spend on the turn.
        type: integer
      main_output_tokens:
        type: integer
      metadata:
        additionalProperties: {}
        type: object
      response_preview:
        description: |-
          ResponsePreview is the derive-time fold of the closing
          conversation-spine llm call's text output — the answer line for
          collapsed turn cards, so summary consumers never need spans.
        type: string
      session_id:
        type: string
      span_count:
        type: integer
      started_at:
        type: string
      status:
        type: string
      total_cost_usd:
        type: number
      total_input_tokens:
        type: integer
      total_output_tokens:
        type: integer
      trace_id:
        type: string
      user_prompt:
        type: string
    type: object
  api.TraceListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.TraceItem'
        type: array
    type: object
  api.TreeAttachment:
    properties:
      node_id:
        type: string
      node_kind:
        type: string
      target_id:
        type: string
      tool_use_id:
        type: string
    type: object
  api.TreeFork:
    properties:
      rejoin_id:
        type: string
      root_id:
        type: string
      source_id:
        type: string
      tool_use_id:
        type: string
    type: object
  api.TreeNode:
    properties:
      content:
        description: |-
          Content is the node's full content blocks (raw, as captured) so
          conversation renderers can format turns without a second fetch.
        items:
          $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ContentBlock'
        type: array
      created_at:
        type: string
      id:
        type: string
      is_leaf:
        type: boolean
      is_root:
        type: boolean
      model:
        type: string
      node_kind:
        type: string
      parent_id:
        type: string
      parent_tool_use_id:
        type: string
      preview:
        type: string
      role:
        type: string
      stop_reason:
        type: string
      thread_id:
        type: string
      tool_uses:
        description: |-
          ToolUses lists the tool_use blocks this node carries (assistant
          turns), so clients can anchor forks/attachments without parsing
          content.
        items:
          $ref: '#/definitions/api.TreeToolUse'
        type: array
      usage:
        $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.Usage'
      verdict:
        allOf:
        - $ref: '#/definitions/api.TreeVerdict'
        description: |-
          Verdict is set on permission-check response nodes: the monitor's
          disposition for the judged action.
    type: object
  api.TreeTask:
    properties:
      description:
        type: string
      id:
        type: string
      status:
        type: string
      subject:
        type: string
      updates:
        type: integer
    type: object
  api.TreeToolUse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  api.TreeVerdict:
    properties:
      disposition:
        description: ALLOW | BLOCK
        type: string
      reasoned:
        type: boolean
      stage:
        type: integer
    type: object
  api.Turn:
    properties:
      agent_name:
        type: string
      content:
        items:
          $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ContentBlock'
        type: array
      created_at:
        type: string
      hash:
        type: string
      model:
        type: string
      parent_hash:
        type: string
      provider:
        type: string
      role:
        type: string
      stop_reason:
        type: string
      usage:
        $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.Usage'
    type: object
  api.swaggerMCPError:
    properties:
      code:
        example: -32600
        type: integer
      message:
        example: invalid request
        type: string
    type: object
  api.swaggerMCPRequest:
    properties:
      id:
        example: "1"
        type: string
      jsonrpc:
        example: "2.0"
        type: string
      method:
        example: tools/call
        type: string
      params:
        additionalProperties: {}
        type: object
    type: object
  api.swaggerMCPResponse:
    properties:
      error:
        $ref: '#/definitions/api.swaggerMCPError'
      id:
        example: "1"
        type: string
      jsonrpc:
        example: "2.0"
        type: string
      result:
        additionalProperties: {}
        type: object
    type: object
  github_com_papercomputeco_tapes_api_search.Output:
    properties:
      count:
        type: integer
      query:
        type: string
      results:
        items:
          $ref: '#/definitions/github_com_papercomputeco_tapes_api_search.Result'
        type: array
    type: object
  github_com_papercomputeco_tapes_api_search.Result:
    properties:
      branch:
        items:
          $ref: '#/definitions/github_com_papercomputeco_tapes_api_search.Turn'
        type: array
      hash:
        type: string
      preview:
        type: string
      role:
        type: string
      score:
        type: number
      turns:
        type: integer
    type: object
  github_com_papercomputeco_tapes_api_search.Turn:
    properties:
      hash:
        type: string
      matched:
        type: boolean
      role:
        type: string
      text:
        type: string
    type: object
  github_com_papercomputeco_tapes_pkg_llm.ContentBlock:
    properties:
      content:
        description: |-
          Content (type="web_search_tool_result" and other server-tool results) -
          the raw result payload Anthropic returns inline on the block, captured
          verbatim as JSON so the variable result-object shapes survive without
          imposing a schema. ToolResultID links it to the paired server_tool_use.
        items:
          type: integer
        type: array
      image_base64:
        description: Base64-encoded image data
        type: string
      image_url:
        description: Image content (type="image")
        type: string
      is_error:
        type: boolean
      media_type:
        description: MIME type (e.g., "image/png")
        type: string
      text:
        description: Text content (type="text")
        type: string
      thinking:
        description: |-
          Thinking (type="thinking") - Anthropic extended-thinking blocks.
          Anthropic emits thinking as content_block_delta frames with type
          "thinking_delta" followed by a "signature_delta" that authenticates the
          block. Consumers treat Thinking as opaque text; the signature is persisted
          so downstream tooling can verify integrity.
        type: string
      thinking_signature:
        type: string
      tool_input:
        additionalProperties: {}
        type: object
      tool_name:
        type: string
      tool_output:
        type: string
      tool_result_id:
        description: Tool result (type="tool_result") - result from tool execution
        type: string
      tool_use_id:
        description: Tool use (type="tool_use") - assistant requesting tool execution
        type: string
      type:
        description: '"text", "image", "tool_use", "tool_result", "thinking"'
        type: string
    type: object
  github_com_papercomputeco_tapes_pkg_llm.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_papercomputeco_tapes_pkg_llm.Usage:
    properties:
      cache_creation_input_tokens:
        description: Cache token counts (Anthropic prompt caching)
        type: integer
      cache_read_input_tokens:
        type: integer
      completion_tokens:
        type: integer
      prompt_duration_ns:
        description: |-
          PromptDurationNs is provider-reported prompt-evaluation time, in
          nanoseconds. Populated by providers that surface it (currently Ollama
          only); left at zero otherwise.
        type: integer
      prompt_tokens:
        description: Token counts
        type: integer
      total_duration_ns:
        description: |-
          TotalDurationNs is the proxy-measured wall-clock time, in nanoseconds,
          from when the proxy received the client request to when the upstream
          response was fully assembled. Set uniformly by the proxy across providers
          — Anthropic and OpenAI don't surface a duration field on the wire, and
          Ollama's server-internal `total_duration` is intentionally overwritten so
          aggregate stats compare apples to apples.
        type: integer
      total_tokens:
        type: integer
    type: object
  github_com_papercomputeco_tapes_pkg_sessions.SessionSummary:
    properties:
      agent_name:
        type: string
      duration_ns:
        $ref: '#/definitions/time.Duration'
      end_time:
        type: string
      harness_id:
        type: string
      harness_session_id:
        type: string
      id:
        type: string
      input_cost:
        type: number
      input_tokens:
        type: integer
      label:
        type: string
      message_count:
        type: integer
      missing_parent:
        type: string
      model:
        type: string
      output_cost:
        type: number
      output_tokens:
        type: integer
      project:
        type: string
      session_count:
        type: integer
      start_time:
        type: string
      status:
        type: string
      tool_calls:
        type: integer
      total_cost:
        type: number
      truncated:
        description: |-
          Truncated is true when this summary was built from a partial chain
          because an ancestor's parent_hash could not be resolved in the
          current store. MissingParent names the hash that would have
          continued the walk if the referenced node existed. Both fields are
          informational — they signal that higher ancestors may live outside
          this store (trimmed history, foreign chain, offloaded data) rather
          than an error.
        type: boolean
    type: object
  time.Duration:
    enum:
    - -9223372036854775808
    - 9223372036854775807
    - 1
    - 1000
    - 1000000
    - 1000000000
    - 60000000000
    - 3600000000000
    format: int64
    type: integer
    x-enum-varnames:
    - minDuration
    - maxDuration
    - Nanosecond
    - Microsecond
    - Millisecond
    - Second
    - Minute
    - Hour
info:
  contact: {}
  description: |-
    HTTP API for inspecting, querying, and searching stored Tapes sessions.

    The REST surface exposes health checks, session listing and retrieval, derived session summaries, aggregate stats, semantic search, and a streamable MCP endpoint.
  title: Tapes API
paths:
  /ping:
    get:
      description: Returns a simple JSON string confirming that the API server is
        reachable.
      produces:
      - application/json
      responses:
        "200":
          description: pong
          schema:
            type: string
      summary: Health check
      tags:
      - health
  /v1/mcp:
    delete:
      description: Requests termination of a streamable MCP session when a client
        is using session-oriented transport semantics.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
      summary: Close an MCP session
      tags:
      - mcp
    get:
      description: Opens the streamable MCP endpoint for server-sent events. Stateless
        clients can use this to receive streamed MCP messages.
      produces:
      - text/event-stream
      responses:
        "200":
          description: Server-sent event stream
          schema:
            type: string
      summary: Open an MCP event stream
      tags:
      - mcp
    post:
      consumes:
      - application/json
      description: |-
        Sends a JSON-RPC 2.0 request to the stateless Model Context Protocol endpoint mounted at /v1/mcp.

        Typical calls include initialize, tools/list, and tools/call. When search is configured, the server exposes a search tool over this transport.
      parameters:
      - description: JSON-RPC 2.0 request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.swaggerMCPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "400":
          description: Invalid JSON-RPC request
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
        "500":
          description: Server-side MCP error
          schema:
            $ref: '#/definitions/api.swaggerMCPResponse'
      summary: Invoke the streamable MCP endpoint
      tags:
      - mcp
  /v1/search:
    get:
      description: Embeds the query text, searches the configured vector store, and
        returns matching sessions with their full conversation branch.
      parameters:
      - description: Search query
        in: query
        name: query
        required: true
        type: string
      - default: 5
        description: Maximum number of results to return
        in: query
        minimum: 1
        name: top_k
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_api_search.Output'
        "400":
          description: Missing or invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Search execution failed
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "503":
          description: Search is not configured
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Semantic search over stored sessions
      tags:
      - search
  /v1/search/spans:
    get:
      description: Embeds the query text and runs vector similarity over the embedded
        span projection (main llm spans, delta-only content). Each hit carries span,
        trace, and turn context.
      parameters:
      - description: Search query
        in: query
        name: query
        required: true
        type: string
      - default: 5
        description: Maximum number of results to return
        in: query
        minimum: 1
        name: top_k
        type: integer
      - description: Tenant org UUID (defaults to the nil org)
        in: header
        name: X-Tapes-Org-Id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SpanSearchOutput'
        "400":
          description: Missing or invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Search execution failed
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "503":
          description: Span search is not configured or not yet initialized
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Semantic search over span embeddings
      tags:
      - search
  /v1/sessions:
    get:
      description: Returns one row per harness session from the sessions table, newest
        first (last_seen_at desc), cursor-paginated. This is the product session view;
        the Merkle leaf-chain view lives at /v1/stems.
      parameters:
      - description: Maximum number of sessions to return (default 50, max 200)
        in: query
        minimum: 1
        name: limit
        type: integer
      - description: Opaque pagination cursor returned by a previous response
        in: query
        name: cursor
        type: string
      - description: Only include sessions active (last_seen_at) at or after this
          RFC3339 timestamp
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include sessions active (last_seen_at) before this RFC3339
          timestamp
        format: date-time
        in: query
        name: until
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionListResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to list sessions
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List sessions
      tags:
      - sessions
  /v1/sessions/{id}:
    get:
      description: Returns a single session, the selected stem of turns, and a summary
        of every stem (root-to-leaf path) in the session. ?stem=longest (default)
        returns the longest stem; ?stem=all returns every node ordered by created_at.
        ?root=<hash> restricts turns to the subtree rooted at that node.
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Which turns to return: longest (default) or all'
        enum:
        - longest
        - all
        in: query
        name: stem
        type: string
      - description: Restrict turns to the subtree rooted at this node hash
        in: query
        name: root
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionDetailResponse'
        "400":
          description: Missing id or unknown root
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a session
      tags:
      - sessions
  /v1/sessions/{id}/raw_turns:
    get:
      description: 'The raw layer''s wire log: one row per captured call or transcript
        push, identity and sizes only. `source` distinguishes what crossed the wire
        from what the harness pushed as its own account.'
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.RawTurnListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List a session's raw capture log (operator)
      tags:
      - sessions
  /v1/sessions/{id}/traces:
    get:
      description: Returns the session's user-visible turns as traces with nested
        spans (llm calls, tools, subagents, shadow calls, injected context) and dataflow
        links. Cross-trace links (compaction seams) are at the response top level.
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: 'Span payload mode: full (default) or preview (strings truncated;
          fetch the span endpoint for full payloads)'
        in: query
        name: payload
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionTracesResponse'
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Span traces not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a session's trace/span projection
      tags:
      - sessions
  /v1/sessions/{id}/tree:
    get:
      description: Returns every captured node for the session typed by node_kind,
        with spine links, subagent fork/rejoin edges, and offshoot attachments (permission
        verdicts, web summaries) anchored to the tool_use they relate to.
      parameters:
      - description: Session id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SessionTreeResponse'
        "400":
          description: Missing or malformed id
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Session not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load session
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Sessions not supported by this backend
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a session's reconciled conversation tree
      tags:
      - sessions
  /v1/stats:
    get:
      description: Returns counts plus cost / token / duration / tool-call / completed-count
        totals for the window. On span-projection backends the numbers are trace-grain
        rollup sums (delta-only usage, agent time = sum of trace durations) so they
        agree with the session and trace views; turn_count counts traces and stem_count
        is omitted. Supplying any legacy per-node filter (project / agent_name / model
        / provider) forces the legacy node-layer aggregate, whose sums re-bill re-sent
        history and whose duration is wall-clock MAX-MIN (PCC-514).
      parameters:
      - description: Filter by project name (forces the legacy node-layer aggregate)
        in: query
        name: project
        type: string
      - description: Filter by agent name (forces the legacy node-layer aggregate)
        in: query
        name: agent_name
        type: string
      - description: Filter by model name (forces the legacy node-layer aggregate)
        in: query
        name: model
        type: string
      - description: Filter by provider name (forces the legacy node-layer aggregate)
        in: query
        name: provider
        type: string
      - description: Only include records at or after this RFC3339 timestamp
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include records before or at this RFC3339 timestamp
        format: date-time
        in: query
        name: until
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.StatsResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to compute stats
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get aggregate session stats
      tags:
      - sessions
  /v1/stems:
    get:
      description: Returns paginated per-stem summaries including derived labels,
        status, token counts, cost, duration, and truncation metadata.
      parameters:
      - description: Filter by project name
        in: query
        name: project
        type: string
      - description: Filter by agent name
        in: query
        name: agent_name
        type: string
      - description: Filter by model name
        in: query
        name: model
        type: string
      - description: Filter by provider name
        in: query
        name: provider
        type: string
      - description: Only include stems updated at or after this RFC3339 timestamp
        format: date-time
        in: query
        name: since
        type: string
      - description: Only include stems updated before or at this RFC3339 timestamp
        format: date-time
        in: query
        name: until
        type: string
      - description: Opaque pagination cursor returned by a previous response
        in: query
        name: cursor
        type: string
      - description: Maximum number of stems to return
        in: query
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.StemListResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to list or summarize stems
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List stems (Merkle leaf chains) with aggregates
      tags:
      - stems
  /v1/stems/{hash}:
    get:
      description: Returns the ancestry chain of a single Merkle leaf in chronological
        order (root first). When depth is provided, only the last N turns are returned
        while the full chain depth is still reported.
      parameters:
      - description: Stem head (leaf) hash
        in: path
        name: hash
        required: true
        type: string
      - description: Maximum number of most-recent turns to include
        in: query
        minimum: 1
        name: depth
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.StemResponse'
        "400":
          description: Missing or invalid hash/depth
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Stem not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load stem
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a stem (Merkle leaf chain)
      tags:
      - stems
  /v1/stems/{hash}/graph:
    get:
      description: Returns a graph-shaped projection of the Merkle DAG around a node
        hash (the same ancestry returned by GET /v1/stems/{hash}). scope=root loads
        the requested node's resolvable root and all descendants, scope=branch loads
        the ancestry plus descendants of the requested node, and scope=ancestry loads
        only the parent chain.
      parameters:
      - description: Node (stem head) hash
        in: path
        name: hash
        required: true
        type: string
      - description: 'Graph scope: root, branch, or ancestry'
        enum:
        - root
        - branch
        - ancestry
        in: query
        name: scope
        type: string
      - description: Maximum number of graph nodes to include
        in: query
        maximum: 5000
        minimum: 1
        name: max_nodes
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GraphResponse'
        "400":
          description: Missing hash or invalid query parameters
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "404":
          description: Stem not found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Failed to load stem graph
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get a stem graph
      tags:
      - stems
  /v1/traces:
    get:
      description: Returns turn headers for a session — no span payloads. Fetch GET
        /v1/traces/{trace_id} per turn for spans and links.
      parameters:
      - description: Session id (UUID)
        in: query
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TraceListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: List a session's traces (summaries)
      tags:
      - traces
  /v1/traces/{trace_id}:
    get:
      description: 'Returns one user-visible turn: its spans nested by parent_span_id
        and its dataflow links (links touching other traces included).'
      parameters:
      - description: Trace id
        in: path
        name: trace_id
        required: true
        type: string
      - description: 'Span payload mode: full (default) or preview (strings truncated;
          fetch the span endpoint for full payloads)'
        in: query
        name: payload
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TraceDetail'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get one trace with spans and links
      tags:
      - traces
  /v1/traces/{trace_id}/spans/{span_id}:
    get:
      description: 'The payload drill-in: one span''s complete input/output content.'
      parameters:
      - description: Trace id
        in: path
        name: trace_id
        required: true
        type: string
      - description: Span id
        in: path
        name: span_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SpanItem'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/github_com_papercomputeco_tapes_pkg_llm.ErrorResponse'
      summary: Get one span with full payloads
      tags:
      - traces
schemes:
- http
- https
swagger: "2.0"
