services:
  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    image: tapes-postgres-cnpg-pgduckdb:17
    environment:
      POSTGRES_DB: tapes
      POSTGRES_USER: tapes
      POSTGRES_PASSWORD: tapes
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama

  tapes:
    build:
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - ollama
    ports:
      - "8080:8080"
      - "8081:8081"
    command: >-
      serve
      --upstream http://ollama:11434
      --postgres postgres://tapes:tapes@postgres:5432/tapes?sslmode=disable
      --vector-store-target postgres://tapes:tapes@postgres:5432/tapes?sslmode=disable
      --embedding-provider ollama
      --embedding-target http://ollama:11434
      --embedding-model nomic-embed-text
      --debug
    volumes:
      - tapes-data:/data

volumes:
  postgres-data:
  tapes-data:
