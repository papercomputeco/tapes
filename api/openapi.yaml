        "501":
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Sessions not supported by this backend
      summary: Export sessions in a time window as JSONL
      tags:
      - sessions
  /v1/stats:
    get:
      description: Returns counts plus cost / token / duration / tool-call / completed-count
        totals for the window. On span-projection backends the numbers are trace-grain
        rollup sums (delta-only usage, agent time = sum of trace durations) so they
        agree with the session and trace views; turn_count counts traces and stem_count
        is omitted. Supplying any legacy per-node filter (project / agent_name / model
        / provider) forces the legacy node-layer aggregate, whose sums re-bill re-sent
        history and whose duration is wall-clock MAX-MIN (PCC-514).
      operationId: getStats
      parameters:
      - description: Filter by project name (forces the legacy node-layer aggregate)
        in: query
        name: project
        schema:
          type: string
      - description: Filter by agent name (forces the legacy node-layer aggregate)
        in: query
        name: agent_name
        schema:
          type: string
      - description: Filter by model name (forces the legacy node-layer aggregate)
        in: query
        name: model
        schema:
          type: string
      - description: Filter by provider name (forces the legacy node-layer aggregate)
        in: query
        name: provider
        schema:
          type: string
      - description: Only include records at or after this RFC3339 timestamp
        in: query
        name: since
        schema:
          format: date-time
          type: string
      - description: Only include records before or at this RFC3339 timestamp
        in: query
        name: until
        schema:
          format: date-time
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Invalid query parameters
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Failed to compute stats
      summary: Get aggregate session stats
      tags:
      - sessions
  /v1/traces:
    get:
      description: Returns turn headers for a session — no span payloads. Fetch GET
        /v1/traces/{trace_id} per turn for spans and links.
      operationId: listTraces
      parameters:
      - description: Session id (UUID)
        in: query
        name: session_id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceListResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error
        "501":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Implemented
      summary: List a session's traces (summaries)
      tags:
      - traces
  /v1/traces/{trace_id}:
    get:
      description: 'Returns one user-visible turn: its spans nested by parent_span_id
        and its dataflow links (links touching other traces included).'
      operationId: getTrace
      parameters:
      - description: Trace id
        in: path
        name: trace_id
        required: true
        schema:
          type: string
      - description: 'Span payload mode: full (default) or preview (strings truncated;
          fetch the span endpoint for full payloads)'
        in: query
        name: payload
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceDetail'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error
        "501":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Implemented
      summary: Get one trace with spans and links
      tags:
      - traces
  /v1/traces/{trace_id}/spans/{span_id}:
    get:
      description: 'The payload drill-in: one span''s complete input/output content.'
      operationId: getSpan
      parameters:
      - description: Trace id
        in: path
        name: trace_id
        required: true
        schema:
          type: string
      - description: Span id
        in: path
        name: span_id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpanItem'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error
        "501":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Implemented
      summary: Get one span with full payloads
      tags:
      - traces
